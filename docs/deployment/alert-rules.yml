# Padrino operational alert rules (US-113).
#
# Prometheus alerting rules covering the same conditions the in-process
# AlertNotifier (src/padrino/observability/alerts.py) fires as webhooks. Ship
# this file with the deploy config and load it via prometheus.yml:
#
#   rule_files:
#     - /etc/prometheus/alert-rules.yml
#
# These rules derive from the metrics already exported on /metrics
# (src/padrino/observability/metrics.py). The webhook notifier and these
# Prometheus rules are redundant on purpose: the webhook gives instant,
# log-pipeline-independent paging; Prometheus gives durable, dashboard-visible
# alerting that survives a notifier crash.
groups:
  - name: padrino-operational
    rules:
      # Spend cap reached: no game has been admitted for a sustained window
      # while continuous matchmaking is enabled often indicates the spend
      # governor is denying admission. Pair with the structured
      # spend.cap.reached log / webhook for confirmation.
      - alert: PadrinoSpendCapReached
        expr: increase(padrino_games_total[30m]) == 0
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Padrino has admitted no games in 30m (possible spend cap)"
          description: >
            No padrino_games_total increments in 30 minutes. If continuous
            matchmaking is enabled this likely means the global spend cap was
            reached and admission is denied. Check the spend.cap.reached alert
            webhook and cumulative LlmCall.cost_usd.

      # Scheduler dead: no inflight gauntlets AND no game completions for an
      # extended window means the scheduler tick is not advancing. Mirrors the
      # scheduler.heartbeat.stale webhook (which reads the heartbeats table).
      - alert: PadrinoSchedulerHeartbeatStale
        expr: increase(padrino_games_total[15m]) == 0 and padrino_scheduler_inflight_gauntlets == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Padrino scheduler appears stalled"
          description: >
            No inflight gauntlets and no completed games for 15 minutes. The
            scheduler worker heartbeat is likely stale; check the
            scheduler.heartbeat.stale webhook and the scheduler_heartbeats table.

      # Moderation gate degraded: games run but none become broadcastable, which
      # is the signature of an unavailable/erroring guard model (fail-closed).
      # Mirrors the moderation.guard.unavailable webhook.
      - alert: PadrinoModerationGuardUnavailable
        expr: increase(padrino_games_total[30m]) > 0 and increase(padrino_broadcast_frames_total[30m]) == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Padrino moderation gate may be degraded"
          description: >
            Games are completing but no broadcast frames are being emitted over
            30 minutes. The guard model is likely None or erroring, so the gate
            fails closed and nothing becomes broadcastable. Check the
            moderation.guard.unavailable webhook and DEEPINFRA_API_KEY.

      # Admission denial streak: a sustained absence of completed games while
      # the system is meant to be matchmaking. Mirrors the
      # admission.denied.streak webhook (N consecutive denials).
      - alert: PadrinoAdmissionDeniedStreak
        expr: increase(padrino_games_total[20m]) == 0
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: "Padrino admission has denied a streak of matches"
          description: >
            No games admitted for 20 minutes. Consecutive admission denials
            (daily cap, concurrency cap, or spend cap) trip the
            admission.denied.streak webhook; check the admission.denied logs.
