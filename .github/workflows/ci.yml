name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Typecheck (mypy)
        run: uv run mypy src tests

      - name: Test (pytest)
        run: uv run pytest -m "not integration" --cov --cov-report=term-missing

      - name: Core engine coverage gate (>=85%)
        run: uv run coverage report --include='src/padrino/core/*' --fail-under=85

  live-llm-cassettes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Cassette-only contract suite (no network)
        env:
          # Cassettes never re-record on CI; PADRINO_RECORD_LLM must stay unset.
          PADRINO_RECORD_LLM: ""
        run: uv run pytest -m live_llm --live-llm

  postgres:
    # US-057: dialect-portability + Alembic suite against a real Postgres
    # spun up via testcontainers. Local devs without docker skip these via
    # tests/conftest.py; CI always has docker so the marker always runs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Postgres dialect + migrations suite
        run: uv run pytest -m postgres

  compose-smoke:
    # US-064: build the bundled Dockerfile and bring the full docker-compose
    # stack (postgres + bootstrap + api + scheduler) up against `pytest -m
    # docker`. Push-to-main only so PRs stay fast — pull-request validation
    # runs the rest of the matrix.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: docker-compose smoke suite
        run: uv run pytest -m docker
