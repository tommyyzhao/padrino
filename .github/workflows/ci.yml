name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # 3.12 is the supported runtime. 3.13 is temporarily dropped: the async
        # SQLAlchemy/aiosqlite test harness (in-memory engine across the
        # per-test event loop) errors on 3.13 ("no such table" + greenlet_spawn)
        # even though the code, migrations, and Postgres path are correct on
        # 3.12. Re-add once the in-memory test-engine harness is made 3.13-safe.
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Typecheck (mypy)
        run: uv run mypy src tests

      - name: Test (pytest)
        run: uv run pytest -m "not integration" --cov --cov-report=term-missing

      - name: Core engine coverage gate (>=85%)
        run: uv run coverage report --include='src/padrino/core/*' --fail-under=85

  live-llm-cassettes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Cassette-only contract suite (no network)
        env:
          # Cassettes never re-record on CI; PADRINO_RECORD_LLM must stay unset.
          PADRINO_RECORD_LLM: ""
        run: uv run pytest -m live_llm --live-llm

  postgres:
    # US-057: dialect-portability + Alembic suite against a real Postgres
    # spun up via testcontainers. Local devs without docker skip these via
    # tests/conftest.py; CI always has docker so the marker always runs.
    #
    # Wave 6: in addition to the testcontainers `-m postgres` markers, the
    # whole non-integration suite is re-run against a real Postgres service
    # container via the `--postgres` fixture path (tests/conftest.py). This is
    # the only place that exercises that fixture, so it must stay green to keep
    # the SQLite/Postgres portability guarantee honest.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: padrino
          POSTGRES_PASSWORD: padrino
          POSTGRES_DB: padrino_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U padrino"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Postgres dialect + migrations suite (testcontainers)
        run: uv run pytest -m postgres

      - name: Full non-integration suite against real Postgres
        env:
          PADRINO_TEST_DB_URL: postgresql+asyncpg://padrino:padrino@localhost:5432/padrino_test
        run: uv run pytest -m "not integration" --postgres

  dashboard-e2e:
    # US-070: Playwright browser tests for the SvelteKit dashboard. Boots
    # the backend via `padrino smoke localhost --keep-running --port 8123`
    # (US-068), builds + previews the static dashboard SPA, and runs the
    # functional specs (leaderboard / games / home) against a real
    # Chromium. Visual-regression checks are opt-in via PADRINO_E2E_VISUAL.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync backend dependencies
        run: uv sync --all-extras

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/dashboard/pnpm-lock.yaml

      - name: Install dashboard dependencies
        working-directory: web/dashboard
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium)
        working-directory: web/dashboard
        run: pnpm exec playwright install --with-deps chromium

      - name: Run dashboard e2e suite
        working-directory: web/dashboard
        env:
          CI: "1"
          PADRINO_REPO_ROOT: ${{ github.workspace }}
        run: pnpm test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-e2e-report
          path: |
            web/dashboard/playwright-report/
            web/dashboard/test-results/
          if-no-files-found: ignore

  secret-audit:
    # US-076: scan git history across all refs for credential-shaped strings
    # (csk-, lw, sk-, sk-ant-, ghp_, gho_, populated *_API_KEY=...). Runs on
    # every push to main and on PRs that touch any file under `.env*` /
    # `scripts/` / the audit machinery itself or its tests. The audit log
    # under `.padrino_audit/` is gitignored — the job only ever surfaces
    # `<sha>\t<file-path>` pairs to the workflow log, never the matched
    # secret value.
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(toJson(github.event.pull_request.changed_files), '.env') ||
      contains(toJson(github.event.pull_request.changed_files), 'scripts/') ||
      contains(toJson(github.event.pull_request.changed_files), 'audit_git_history_for_secrets.sh') ||
      contains(toJson(github.event.pull_request.changed_files), '.github/workflows/ci.yml')
    steps:
      - uses: actions/checkout@v4
        with:
          # The audit walks every ref, so a shallow clone would miss
          # historical commits on side branches.
          fetch-depth: 0

      - name: Scan git history for secret-shaped strings
        run: bash scripts/audit_git_history_for_secrets.sh

  compose-smoke:
    # US-064: build the bundled Dockerfile and bring the full docker-compose
    # stack (postgres + bootstrap + api + scheduler) up against `pytest -m
    # docker`. Push-to-main only so PRs stay fast — pull-request validation
    # runs the rest of the matrix.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: docker-compose smoke suite
        run: uv run pytest -m docker
